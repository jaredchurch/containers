name: Build and Push Custom Base Image

on:
  push:
    branches:
      - main
    # ⚡ Only runs if you actually change the base image files
    paths:
      - 'base-image/**'
      - '.github/workflows/build-base.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/base

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to publish images to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Print Dockerfile.base to log
        run: cat ./base-image/Dockerfile.base

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine next version tag
        id: next-version
        run: |
          TOKEN="${{ secrets.GITHUB_TOKEN }}"
          RESPONSE=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "https://${{ env.REGISTRY }}/v2/${{ env.IMAGE_NAME }}/tags/list")
          MAX=$(echo "$RESPONSE" | jq -r '.tags // [] | map(select(test("^v\\d+$"))) | map(.[1:] | tonumber) | max // 0')
          echo "tag=v$((MAX + 1))" >> "$GITHUB_OUTPUT"
          echo "Building base image version: v$((MAX + 1))"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./base-image
          file: ./base-image/Dockerfile.base
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          # Add next line above with indent to also publish a version tag (e.g. v1, v2, ...)
          # ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.next-version.outputs.tag }}
          # Optimises subsequent runs by caching build layers securely inside GitHub
          cache-from: type=gha
          cache-to: type=gha,mode=max
