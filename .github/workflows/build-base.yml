name: Build and Push Custom Base Image

on:
  push:
    branches:
      - main
    # ⚡ Only runs if you actually change the base image files
    paths:
      - 'base-image/**'
      - '.github/workflows/build-base.yml'

env:
  REGISTRY: ghcr.io
  # This automatically formats to: ghcr.io/your-github-username/base
  IMAGE_NAME: ${{ github.repository_owner }}/base
  # Creates a sequential integer tag like 'v1', 'v2', 'v3' automatically
  VERSION_TAG: v${{ github.run_number }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to publish images to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./base-image
          file: ./base-image/Dockerfile.base
          push: true
          # Tags the image with both the unique sequential integer and updates latest
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          # Optimises subsequent runs by caching build layers securely inside GitHub
          cache-from: type=gha
          cache-to: type=gha,mode=max


#            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION_TAG }}
